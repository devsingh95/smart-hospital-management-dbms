<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Hospital Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <header class="site-header">
        <div class="brand-wrap" data-reveal>
            <div class="brand">Smart Hospital</div>
            <p class="brand-sub">DBMS Project Dashboard Suite</p>
        </div>
        <nav data-reveal>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('add_patient_page') }}">Add Patient</a>
            <a href="{{ url_for('add_doctor_page') }}">Add Doctor</a>
            <a href="{{ url_for('book_appointment_page') }}">Book Appointment</a>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('records_page') }}">Records</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>DBMS Mini Project | {{ now.year }} | Flask + MySQL</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
